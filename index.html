<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>HRNEIROWAY — Материалы для бизнеса</title>
    <meta
      name="description"
      content="HRNEIROWAY превращает сложную HR-информацию в понятные материалы: welcome book, инструкции, гайды, презентации и внутренние коммуникации."
    >
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    >
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main>
      <section class="hero" aria-labelledby="hero-title">
        <header class="site-header" aria-label="Главная навигация">
          <a class="site-logo" href="#" aria-label="Эйчар с душой дизайнера">Эйчар с душой дизайнера</a>
          <nav class="site-nav" aria-label="Разделы сайта">
            <a href="#">Главная</a>
            <a href="#">Услуги</a>
            <a href="#">Обо мне</a>
            <a href="#">Проекты</a>
            <a href="#">Полезное</a>
            <a href="#">Контакты</a>
          </nav>
        </header>

        <div class="portrait portrait--main">
          <img src="./assets/images/marina-portrait.png" alt="Марина, основатель HRNEIROWAY">
        </div>
        <p class="portrait-caption">Марина Голяева<br>15+ лет в HR</p>

        <div class="photo-slot photo-slot--right" aria-label="Welcome book и HR-материалы">
          <img src="./assets/images/design-green-mood.jpeg" alt="Welcome book и визуальная система HRNEIROWAY">
        </div>

        <div class="photo-slot photo-slot--left" aria-label="Марина за рабочим столом HRNEIROWAY">
          <img src="./assets/images/marina-workspace.png" alt="Марина работает с welcome book и HR-материалами">
        </div>

        <div class="hero-copy">
          <h1 id="hero-title">
            <span class="hero-title-main"><span class="clarity-word">Материалы</span></span>
            <span class="hero-title-main">для бизнеса</span>
          </h1>
          <p class="hero-title-subline">которыми удобно пользоваться</p>
        </div>

        <p class="hero-subtitle">
          <span>Делаю сложное —</span>
          <span class="script-accent">понятным</span>
        </p>

        <div class="hero-tags" aria-label="Направления материалов">
          <span>Инструкции</span>
          <span>Гайды</span>
          <span>Презентации</span>
          <span>Базы знаний</span>
          <span>Адаптация</span>
          <span>Внутренние коммуникации</span>
          <span>Автоматизация</span>
          <span>Сайты</span>
        </div>

        <a class="hero-cta" href="#" aria-label="Обсудить проект">
          <span>Обсудить проект</span>
        </a>

        <div class="editorial-line line-one" aria-hidden="true"></div>
        <div class="editorial-line line-two" aria-hidden="true"></div>
        <div class="bookmark" aria-hidden="true"></div>
      </section>
    </main>
    <script src="./script.js"></script>
  </body>
</html>
